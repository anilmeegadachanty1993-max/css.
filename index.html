<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css basics</title>
    <link rel="stylesheet" href="style.css">

    <style>
        h2 { color: aqua;}
    </style>
</head>
<body>
    <h1 style="color: blue;">inline css</h1>

    <h2>internal css</h2>

    <h3>external css</h3>

    <h4>element selector</h4>

    <h5 class="my class">class selector</h5>

    <h6 id="my id">id selector</h6>

    <p>group selector</p>

</body>
</html>
